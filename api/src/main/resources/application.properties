spring.application.name=yeni-backoffice

spring.profiles.active=test

spring.thymeleaf.cache=false
spring.thymeleaf.encoding=UTF-8

server.servlet.encoding.charset=UTF-8
server.servlet.encoding.enabled=true
server.servlet.encoding.force=true
spring.web.resources.chain.cache=false

spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.format_sql=true

server.port=8080

portfolio.inicis.mid=${INICIS_MID:INIpayTest}
portfolio.inicis.sign-key=${INICIS_SIGN_KEY:portfolio-local-sign-key}
portfolio.inicis.return-url=${INICIS_RETURN_URL:http://localhost:8080/api/payments/inicis/stdpay/return}
portfolio.inicis.close-url=${INICIS_CLOSE_URL:http://localhost:8080/payments/close}
