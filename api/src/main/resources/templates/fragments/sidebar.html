<aside class="sidebar" id="sidebar" xmlns:th="http://www.thymeleaf.org">
    <div class="logo">
        <div>
            <div class="logo-text">Yeni<span>Backoffice</span></div>
            <div class="logo-sub">커머스 운영 포트폴리오</div>
        </div>
    </div>

    <nav class="nav">
        <div class="nav-group"
             th:each="group : ${sidebarNavigationGroups}"
             th:data-group-code="${group.groupCode}"
             th:data-has-active="${#lists.contains(group.items.![active], true)}">
            <button type="button" class="nav-group-toggle" aria-expanded="true">
                <span class="nav-title" th:text="${group.groupName}">메뉴</span>
                <span class="nav-arrow">▾</span>
            </button>

            <div class="nav-group-items">
                <a th:each="item : ${group.items}"
                   th:href="@{${item.itemUrl}}"
                   th:classappend="${item.active} ? 'active' : ''">
                    <span class="nav-icon" th:text="${item.icon ?: ''}">메뉴</span>
                    <span th:text="${item.itemName}">개요</span>
                </a>
            </div>
        </div>
    </nav>

    <div class="sidebar-footer">
        <strong>포트폴리오 데모</strong>
    </div>
</aside>
