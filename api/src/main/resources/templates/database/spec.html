<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DB 명세 - Yeni Backoffice</title>

    <link rel="stylesheet" th:href="@{/css/common.css}" />
    <link rel="stylesheet" th:href="@{/css/layout.css}" />
    <link rel="stylesheet" th:href="@{/css/scroll-top.css}" />
    <link rel="stylesheet" th:href="@{/css/components.css}" />
    <link rel="stylesheet" th:href="@{/css/pages/database-spec.css}" />
</head>

<body>
<div class="layout">
    <div th:replace="~{fragments/sidebar}"></div>

    <main class="main">
        <div th:replace="~{fragments/topbar :: header}"></div>

        <section class="content db-spec-page">
            <div class="db-hero">
                <span class="badge">전체 스키마 자동 명세</span>
                <h2>PG 결제 운영 DB 명세</h2>
                <p th:text="${description}">
                    결제, 취소, 매출 원장, 외부전송, 알림톡, 복구 작업, 정산 테이블의 역할과 컬럼 구조를 확인합니다.
                </p>
            </div>

            <div class="db-table-grid">
                <article class="card db-card" th:each="table : ${tableSpecs}">
                    <div class="db-card-header">
                        <h3 th:text="${table.tableName}">table_name</h3>
                        <p th:text="${table.tableDescription}">description</p>
                    </div>
                    <div class="table-wrap">
                        <table>
                            <thead>
                            <tr>
                                <th>컬럼명</th>
                                <th>데이터 타입</th>
                                <th>PK</th>
                                <th>NULL</th>
                                <th>기본값</th>
                                <th>설명</th>
                            </tr>
                            </thead>
                            <tbody>
                            <tr th:each="column : ${table.columns}">
                                <td th:text="${column.columnName}">id</td>
                                <td><span class="keyword" th:text="${column.dataType}">PK / BIGINT</span></td>
                                <td>
                                    <span class="db-flag pk" th:if="${column.primaryKey}">PK</span>
                                    <span class="db-muted" th:unless="${column.primaryKey}">-</span>
                                </td>
                                <td>
                                    <span class="db-flag nullable" th:if="${column.nullable}">허용</span>
                                    <span class="db-flag required" th:unless="${column.nullable}">필수</span>
                                </td>
                                <td th:text="${column.defaultValue ?: '-'}">-</td>
                                <td th:text="${column.columnDescription}">description</td>
                            </tr>
                            </tbody>
                        </table>
                    </div>
                </article>
            </div>
        </section>
    </main>
</div>

<script th:src="@{/js/common.js}"></script>
<script th:src="@{/js/scroll-top.js}"></script>
</body>
</html>
