projects:
  - no: "01"
    key: "migration"
    period: "2024.12 ~ 2025.03"
    company: "KG이니시스"
    title: "MS-SQL → MySQL/MariaDB 마이그레이션 및 변환 보조 도구 개발"
    desc: "MS-SQL 기반 시스템을 MySQL/MariaDB 환경으로 전환하며 테이블 스키마 변환 보조 도구를 개발하고, 프로시저·함수·쿼리 호환성을 수정·검증한 프로젝트"
    role: "DB 마이그레이션 / 서버 개발"
    domain: "DB 전환 / 백오피스 / POS·KIOSK 관리 시스템"
    tech: ["C#", ".NET", "MS-SQL", "MySQL", "MariaDB", "Dapper", "Procedure", "Function", "SQL 변환", "DB 마이그레이션"]
    overview: "MS-SQL 기반으로 운영되던 백오피스 및 관리 시스템을 MySQL/MariaDB 환경에 맞게 전환하는 DB 마이그레이션 작업에 참여했습니다. 단순 데이터 이관이 아니라 테이블 스키마, PK/FK 제약조건, 프로시저, 함수, 조회 쿼리 등 DBMS별 문법 차이가 발생하는 영역을 분석하고 수정했습니다. 반복 작업이 많은 테이블 구조 변환은 C# 기반 프로그램을 작성해 MySQL/MariaDB용 CREATE TABLE 문 생성을 보조했고, 프로시저와 함수는 정의를 추출한 뒤 DBMS 문법 차이에 맞게 직접 수정하고 실행 결과를 확인했습니다."
    responsibilities:
      - "MS-SQL 기반 테이블 스키마 분석"
      - "MySQL/MariaDB 환경에 맞는 CREATE TABLE 문 생성 보조 로직 개발"
      - "컬럼 타입, NULL 여부, 기본값, PK/FK 제약조건 변환 기준 정리"
      - "프로시저/함수 정의 추출용 C# 프로그램 작성"
      - "추출한 프로시저/함수를 MySQL/MariaDB 문법에 맞게 수동 변환"
      - "MS-SQL 전용 함수 및 문법을 MySQL/MariaDB 문법으로 변경"
      - "변환된 쿼리의 실행 오류 확인 및 수정"
      - "기존 기능과 동일한 결과가 나오는지 조회 결과 검증"
      - "Dapper 기반 코드에서 DBMS 변경에 따른 SQL 호환성 수정"
    implementation:
      - "MS-SQL 시스템 테이블 정보를 조회하여 테이블명, 컬럼명, 데이터 타입, NULL 여부, 기본값 정보 추출"
      - "추출한 테이블 정보를 기준으로 MySQL/MariaDB용 CREATE TABLE 문 생성"
      - "Primary Key, Foreign Key 등 제약조건을 MySQL/MariaDB 문법에 맞게 변환"
      - "프로시저와 함수는 별도 프로그램으로 정의를 추출한 뒤 직접 문법 수정"
      - "ISNULL, GETDATE, CONVERT, DATEADD, DATEDIFF, TOP, WITH (NOLOCK), SELECT INTO, 임시 테이블, 동적 SQL 등 MS-SQL 전용 문법 변경"
      - "BULK INSERT 기반 로직은 MySQL/MariaDB 환경에 맞는 LOAD DATA 계열 방식으로 검토"
      - "PIVOT, MERGE, FULL OUTER JOIN 등 MySQL/MariaDB에서 그대로 사용할 수 없는 문법은 대체 방식 검토"
      - "페이징, 집계, 동적 SQL, 통계 조회 쿼리에서 결과가 동일하게 나오도록 조건 확인"
      - "변환 후 실행 오류 및 결과 차이를 확인하며 프로시저/함수 단위로 수정"
    achievements:
      - "반복적인 테이블 스키마 변환 작업을 C# 프로그램으로 보조"
      - "MS-SQL 기반 테이블 구조를 MySQL/MariaDB용 CREATE TABLE 문으로 변환하는 기준 정리"
      - "프로시저/함수 정의를 추출하고 DBMS 문법 차이에 맞게 직접 변환·검증"
      - "Dapper 기반 쿼리 사용 구간에서 DBMS 변경에 따른 SQL 호환성 수정"
      - "실행 오류와 결과 차이를 확인하며 DB 전환 과정에서 발생하는 쿼리 이슈 수정"

